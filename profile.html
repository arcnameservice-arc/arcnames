<style>
  :root {
    --bg:      #F0F4F8;
    --bg2:     #FFFFFF;
    --bg3:     #EBF0F5;
    --border:  rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.5);
    --arc:     #0D9488;
    --arc2:    #0F766E;
    --arc-dim: rgba(13,148,136,0.10);
    --purple:  #6366F1;
    --text:    #0F172A;
    --muted:   #94A3B8;
    --muted2:  #64748B;
    --danger:  #EF4444;
    --success: #10B981;
    --warn:    #F59E0B;
    --grid-line: rgba(13,148,136,0.04);
    --nav-bg:  rgba(240,244,248,0.9);
    --card-border: rgba(0,0,0,0.08);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:      #0B0F14;
      --bg2:     #111820;
      --bg3:     #1A222D;
      --border:  rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.5);
      --text:    #F1F5F9;
      --muted:   #475569;
      --muted2:  #94A3B8;
      --grid-line: rgba(13,148,136,0.03);
      --nav-bg:  rgba(11,15,20,0.9);
      --card-border: rgba(255,255,255,0.08);
    }
  }
</style>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Nav ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 64px;
    background: var(--nav-bg);
    backdrop-filter: blur(20px);
    border-bottom: 0.5px solid var(--card-border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.5px;
    text-decoration: none;
    color: var(--text);
  }

  .logo-icon {
    width: 30px; height: 30px;
    background: var(--arc);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #fff;
    font-weight: 700;
  }

  .logo span { color: var(--arc); }

  .nav-back {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--muted2);
    text-decoration: none;
    padding: 6px 12px; border-radius: 8px;
    border: 0.5px solid var(--card-border);
    background: var(--bg3);
    transition: all .2s;
  }

  .nav-back:hover { color: var(--arc); border-color: var(--arc); background: var(--arc-dim); }

  /* ── Main ── */
  .main {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Card base ── */
  .card {
    background: var(--bg2);
    border: 0.5px solid var(--card-border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }

  /* ── Hero card ── */
  .hero-card {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
</style>
<style>
  .avatar-circle {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--arc) 0%, var(--purple) 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 26px; font-weight: 700; color: #fff;
    flex-shrink: 0;
    border: 0.5px solid var(--card-border);
    overflow: hidden;
  }

  .avatar-circle img {
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 50%;
  }

  .hero-info { flex: 1; min-width: 0; }

  .hero-name-row {
    display: flex; align-items: center;
    gap: 10px; flex-wrap: wrap;
    margin-bottom: 6px;
  }

  .hero-display-name {
    font-size: 22px; font-weight: 700;
    color: var(--text);
  }

  .hero-arc-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    border: 0.5px solid var(--arc);
    background: var(--arc-dim);
    color: var(--arc);
    font-size: 12px; font-family: 'Space Mono', monospace;
    font-weight: 700; white-space: nowrap;
  }

  .hero-bio {
    font-size: 14px; color: var(--muted2);
    line-height: 1.6; margin-bottom: 14px;
  }

  .hero-socials {
    display: flex; flex-wrap: wrap; gap: 8px;
  }

  .social-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    border: 0.5px solid var(--card-border);
    border-radius: 8px;
    background: var(--bg3);
    color: var(--muted2);
    font-size: 12px; font-weight: 600;
    font-family: 'Space Grotesk', sans-serif;
    text-decoration: none;
    transition: all .2s;
  }

  .social-btn:hover { border-color: var(--arc); color: var(--arc); background: var(--arc-dim); }

  /* ── Metrics row ── */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .metric-card {
    background: var(--bg2);
    border: 0.5px solid var(--card-border);
    border-radius: 16px;
    padding: 20px;
  }

  .metric-label {
    font-size: 12px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.4px;
    margin-bottom: 6px;
  }

  .metric-value {
    font-size: 28px; font-weight: 700;
    color: var(--text); line-height: 1;
    font-family: 'Space Mono', monospace;
  }

  /* ── Names card ── */
  .card-label {
    font-size: 11px; font-family: 'Space Mono', monospace;
    color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 16px;
  }

  .name-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 0.5px solid var(--border);
    gap: 12px;
  }

  .name-row:last-of-type { border-bottom: none; }

  .name-row-left {
    display: flex; align-items: center; gap: 10px;
    min-width: 0;
  }

  .name-dot {
    width: 16px; height: 16px; flex-shrink: 0;
    border-radius: 50%;
    border: 1.5px solid var(--muted);
    display: flex; align-items: center; justify-content: center;
  }

  .name-dot.primary {
    border-color: var(--warn);
    background: rgba(245,158,11,0.1);
  }

  .name-text {
    font-family: 'Space Mono', monospace;
    font-size: 15px; font-weight: 700;
    color: var(--text);
  }

  .primary-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 20px;
    background: rgba(16,185,129,0.1);
    border: 0.5px solid rgba(16,185,129,0.3);
    color: var(--success);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.3px;
  }

  .name-expiry {
    font-size: 12px; color: var(--muted);
    white-space: nowrap; flex-shrink: 0;
    font-family: 'Space Mono', monospace;
  }

  .more-names-btn {
    display: block; text-align: center;
    padding: 12px; margin-top: 8px;
    font-size: 13px; color: var(--muted2);
    cursor: pointer; border-radius: 8px;
    transition: background .2s;
    border: none; background: none;
    width: 100%;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
  }

  .more-names-btn:hover { background: var(--bg3); color: var(--arc); }
</style>
<style>
  /* ── Activity card ── */
  .activity-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 0;
    border-bottom: 0.5px solid var(--border);
  }

  .activity-item:last-child { border-bottom: none; padding-bottom: 0; }

  .act-dot {
    width: 9px; height: 9px; border-radius: 50%;
    flex-shrink: 0; margin-top: 5px;
  }

  .act-dot.register { background: var(--success); }
  .act-dot.renew    { background: #3B82F6; }
  .act-dot.list     { background: var(--warn); }
  .act-dot.sell     { background: var(--purple); }

  .act-desc {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin-bottom: 3px;
  }

  .act-desc .act-name {
    font-family: 'Space Mono', monospace;
  }

  .act-meta {
    font-size: 12px; color: var(--muted);
  }

  /* ── Loading / Error states ── */
  .state-wrap {
    text-align: center; padding: 60px 24px;
  }

  .state-icon {
    font-size: 42px; margin-bottom: 16px; opacity: 0.5;
  }

  .state-title {
    font-size: 18px; font-weight: 700; margin-bottom: 8px;
  }

  .state-sub {
    font-size: 14px; color: var(--muted2); line-height: 1.6;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2.5px solid var(--border2);
    border-top-color: var(--arc);
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 0.9s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Address chip ── */
  .addr-chip {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 12px; color: var(--muted2);
    background: var(--bg3);
    border: 0.5px solid var(--card-border);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    user-select: none;
    transition: color .15s;
    text-decoration: none;
  }

  .addr-chip:hover { color: var(--arc); }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    nav { padding: 0 16px; height: 56px; }
    .main { padding: 24px 16px 80px; }
    .metrics-row { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .metric-card { padding: 16px 12px; }
    .metric-value { font-size: 22px; }
    .hero-card { gap: 14px; }
    .avatar-circle { width: 56px; height: 56px; font-size: 20px; }
    .hero-display-name { font-size: 18px; }
    .card { padding: 18px 16px; }
  }

  @media (max-width: 400px) {
    .metrics-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<div class="main" id="main">
  <!-- Loading state -->
  <div class="card" id="loadingState">
    <div class="state-wrap">
      <div class="spinner"></div>
      <div class="state-title" id="loadingTitle">Loading profile…</div>

<script>
  // ── Contract config (same as index.html) ──
  const RPC_URL             = 'https://rpc.testnet.arc.network';
  const CONTRACT_ADDRESS    = '0xBE267dcfC6eeB905e788358eAA792e2eCcB23F01';
  const PROFILE_ADDRESS     = '0x659AcAC311050D57859768d3dfB6fcDB8993679a';
  const MARKET_ADDRESS      = '0xADd462229371E79bF5f65EFFCd8C3fb21815eD99';
  const REGISTRY_DEPLOY_BLOCK = 46774056;
  const MARKET_DEPLOY_BLOCK   = 46780922;
  const ARC_CHAIN_ID = 5042002;

  const REGISTRY_ABI = [
    "function getRecord(string name) view returns (address nameOwner, uint256 expiry, uint256 registeredAt, bool available)",
    "function getNamesOf(address wallet) view returns (string[])",
    "function getPrimaryName(address wallet) view returns (string)",
  ];

  const PROFILE_ABI = [
    "function getProfile(string name) view returns (string[] keys, string[] values)",
  ];

  const ACTIVITY_ABI = [
    "event Registered(address indexed owner, string name, uint256 numYears, uint256 expiry, uint256 paid)",
    "event Renewed(address indexed owner, string name, uint256 numYears, uint256 newExpiry, uint256 paid)",
  ];

  const MARKET_ABI = [
    "event Listed(address indexed seller, string name, uint256 price)",
    "event Sold(address indexed seller, address indexed buyer, string name, uint256 price, uint256 fee)",
  ];
</script>
<script>
  // ── Helpers ──
  function relTime(ts) {
    const diff = Math.floor((Date.now() / 1000) - ts);
    if (diff < 60)    return `${diff}s ago`;
    if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return `${Math.floor(diff/86400)}d ago`;
  }

  function relTimeBlock(blockNum, currentBlock) {
    const blocksAgo = currentBlock - blockNum;
    const secsAgo   = blocksAgo * 2; // ~2s per block on Arc
    const thenTs    = Math.floor(Date.now() / 1000) - secsAgo;
    return relTime(thenTs);
  }

  function shortAddr(addr) {
    return addr.slice(0,6) + '…' + addr.slice(-4);
  }

  function fmtUsdc(bn) {
    return '$' + parseFloat(ethers.utils.formatUnits(bn, 6)).toFixed(2).replace(/\.00$/, '');
  }

  function fmtExpiry(ts) {
    if (!ts || ts === 0) return '—';
    return new Date(ts * 1000).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  }

  function getNameFromPath() {
    // Supports: /profile/satoshi.arc  or  /profile/satoshi
    const parts = window.location.pathname.split('/').filter(Boolean);
    // parts[0] = 'profile', parts[1] = name
    let raw = parts[1] || '';
    // strip .arc suffix if present for contract calls
    return raw.replace(/\.arc$/i, '').toLowerCase().trim();
  }

  function setPageTitle(name) {
    document.title = `${name}.arc — ArcNames`;
  }

  function showError(title, sub) {
    document.getElementById('loadingState').innerHTML = `
      <div class="state-wrap">
        <div class="state-icon">⚠️</div>
        <div class="state-title">${title}</div>
        <div class="state-sub">${sub}</div>
      </div>`;
  }

  // ── Main loader ──
  async function loadProfile() {
    const name = getNameFromPath();

    if (!name) {
      showError('No name specified', 'Use /profile/yourname.arc to view a profile.');
      return;
    }

    setPageTitle(name);
    document.getElementById('loadingTitle').textContent = `Loading ${name}.arc…`;

    // Wait for ethers
    await waitForEthers();

    const prov = new ethers.providers.JsonRpcProvider(RPC_URL);
    const registry = new ethers.Contract(CONTRACT_ADDRESS, REGISTRY_ABI, prov);
    const profContract = new ethers.Contract(PROFILE_ADDRESS, PROFILE_ABI, prov);

    let rec, profileData, ownerAddress, allNames, primaryName;

    try {
      rec = await registry.getRecord(name);
    } catch(e) {
      showError('Name not found', `"${name}.arc" does not exist on Arc Testnet.`);
      return;
    }

    if (rec.available || rec.nameOwner === ethers.constants.AddressZero) {
      showError('Name not registered', `"${name}.arc" is not yet registered.`);
      return;
    }

    ownerAddress = rec.nameOwner;

    // Parallel fetch: profile text records + all names + primary
    [profileData, allNames, primaryName] = await Promise.all([
      profContract.getProfile(name).catch(() => ({ 0: [], 1: [] })),
      registry.getNamesOf(ownerAddress).catch(() => []),
      registry.getPrimaryName(ownerAddress).catch(() => ''),
    ]);

    // Parse profile text map
    const tm = {};
    const keys   = profileData[0] || [];
    const values = profileData[1] || [];
    keys.forEach((k, i) => { tm[k] = values[i]; });

    // Fetch each name's expiry individually (batch parallel)
    const nameRecords = {};
    await Promise.all(allNames.map(async n => {
      try {
        const r = await registry.getRecord(n);
        nameRecords[n] = r.expiry.toNumber();
      } catch(e) {
        nameRecords[n] = 0;
      }
    }));

    // Fetch activity events (chunked)
    const currentBlock = await prov.getBlockNumber();
    const activity = await fetchActivity(prov, ownerAddress, currentBlock);

    // Compute metrics
    const totalUsdc = activity
      .filter(a => a.type === 'register' || a.type === 'renew')
      .reduce((s, a) => s + a.paidRaw, 0);

    const firstRegBlock = activity
      .filter(a => a.type === 'register')
      .sort((a, b) => a.blockNum - b.blockNum)[0];

    const firstRegStr = firstRegBlock
      ? new Date(Date.now() - (currentBlock - firstRegBlock.blockNum) * 2000)
          .toLocaleDateString('en-US', { month: 'short', year: 'numeric' })
      : fmtExpiry(rec.registeredAt.toNumber());

    // Render page
    renderProfile({
      name, rec, tm, allNames, primaryName, ownerAddress,
      nameRecords, totalUsdc, firstRegStr, activity, currentBlock
    });
  }

  async function fetchActivity(prov, ownerAddress, currentBlock) {
    const actRegistry = new ethers.Contract(CONTRACT_ADDRESS, ACTIVITY_ABI, prov);
    const actMarket   = new ethers.Contract(MARKET_ADDRESS, MARKET_ABI, prov);
    const CHUNK = 9999;
    let events = [];

    for (let from = REGISTRY_DEPLOY_BLOCK; from <= currentBlock; from += CHUNK) {
      const to = Math.min(from + CHUNK - 1, currentBlock);
      try {
        const [reg, ren] = await Promise.all([
          actRegistry.queryFilter(actRegistry.filters.Registered(ownerAddress), from, to),
          actRegistry.queryFilter(actRegistry.filters.Renewed(ownerAddress),    from, to),
        ]);
        reg.forEach(e => events.push({ type:'register', name: e.args.name, blockNum: e.blockNumber, paidRaw: parseFloat(ethers.utils.formatUnits(e.args.paid, 6)) }));
        ren.forEach(e => events.push({ type:'renew',    name: e.args.name, blockNum: e.blockNumber, paidRaw: parseFloat(ethers.utils.formatUnits(e.args.paid, 6)) }));
      } catch(e) { /* continue */ }
    }

    for (let from = MARKET_DEPLOY_BLOCK; from <= currentBlock; from += 9999) {
      const to = Math.min(from + 9998, currentBlock);
      try {
        const listed = await actMarket.queryFilter(actMarket.filters.Listed(ownerAddress), from, to);
        listed.forEach(e => events.push({ type:'list', name: e.args.name, blockNum: e.blockNumber, paidRaw: parseFloat(ethers.utils.formatUnits(e.args.price, 6)) }));
      } catch(e) { /* continue */ }
    }

    return events.sort((a, b) => b.blockNum - a.blockNum);
  }
</script>
<script>
  function renderProfile({ name, rec, tm, allNames, primaryName, ownerAddress,
                            nameRecords, totalUsdc, firstRegStr, activity, currentBlock }) {
    const displayName   = tm['display'] || (name.charAt(0).toUpperCase() + name.slice(1));
    const bio           = tm['bio']     || '';
    const twitterHandle = tm['com.twitter'] || '';
    const avatarUrl     = tm['avatar'] || '';

    // Avatar HTML
    const fallbackLetter = name[0].toUpperCase();
    const avatarHtml = avatarUrl
      ? `<img src="${avatarUrl}" alt="${displayName}" onerror="this.parentElement.textContent='${fallbackLetter}'">`
      : fallbackLetter;

    // Social buttons
    let socialsHtml = '';
    if (twitterHandle) {
      const handle = twitterHandle.startsWith('@') ? twitterHandle : '@' + twitterHandle;
      socialsHtml += `<a class="social-btn" href="https://x.com/${handle.slice(1)}" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.836L1.254 2.25H8.08l4.259 5.637L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
        ${handle}
      </a>`;
    }

    // Names list — primary first, then rest; max 3 shown
    const SHOW = 3;
    const sorted = primaryName
      ? [primaryName, ...allNames.filter(n => n !== primaryName)]
      : [...allNames];
    const displayed = sorted.slice(0, SHOW);
    const hidden    = sorted.slice(SHOW);

    const nameRowsHtml = displayed.map(n => {
      const isPrim   = n === primaryName;
      const expiryTs = nameRecords[n] || 0;
      return `
        <div class="name-row">
          <div class="name-row-left">
            <div class="name-dot${isPrim ? ' primary' : ''}">
              ${isPrim ? `<svg width="9" height="9" viewBox="0 0 24 24" fill="#F59E0B">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
              </svg>` : ''}
            </div>
            <span class="name-text">${n}.arc</span>
            ${isPrim ? '<span class="primary-badge">✓ primary</span>' : ''}
          </div>
          <span class="name-expiry">Expires ${fmtExpiry(expiryTs)}</span>
        </div>`;
    }).join('');

    const hiddenRowsHtml = hidden.map(n => {
      const expiryTs = nameRecords[n] || 0;
      return `
        <div class="name-row">
          <div class="name-row-left">
            <div class="name-dot"></div>
            <span class="name-text">${n}.arc</span>
          </div>
          <span class="name-expiry">Expires ${fmtExpiry(expiryTs)}</span>
        </div>`;
    }).join('');

    const moreHtml = hidden.length > 0
      ? `<button class="more-names-btn" id="moreNamesBtn" onclick="expandNames()">
           + ${hidden.length} more name${hidden.length > 1 ? 's' : ''}
         </button>
         <div id="hiddenNames" style="display:none">${hiddenRowsHtml}</div>`
      : '';

    // Activity list (max 8)
    const actLabels = {
      register: 'registered',
      renew:    'renewed',
      list:     'listed for sale',
      sell:     'sold',
    };
    const activityHtml = activity.slice(0, 8).map(a => `
      <div class="activity-item">
        <div class="act-dot ${a.type}"></div>
        <div>
          <div class="act-desc"><span class="act-name">${a.name}.arc</span> ${actLabels[a.type] || a.type}</div>
          <div class="act-meta">${relTimeBlock(a.blockNum, currentBlock)} · ${a.paidRaw % 1 === 0 ? a.paidRaw : a.paidRaw.toFixed(2)} USDC</div>
        </div>
      </div>`).join('')
      || `<div class="state-sub" style="padding:16px 0">No activity found.</div>`;

    const usdcStr = totalUsdc > 0
      ? '$' + (totalUsdc % 1 === 0 ? totalUsdc : totalUsdc.toFixed(2))
      : '—';

    // Build page
    document.getElementById('main').innerHTML = `
      <!-- Hero card -->
      <div class="card hero-card">
        <div class="avatar-circle">${avatarHtml}</div>
        <div class="hero-info">
          <div class="hero-name-row">
            <span class="hero-display-name">${displayName}</span>
            <span class="hero-arc-badge">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
              ${name}.arc
            </span>
          </div>
          ${bio ? `<div class="hero-bio">${bio}</div>` : ''}
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;${socialsHtml ? 'margin-bottom:10px' : ''}">
            <a class="addr-chip"
               href="https://testnet.arcscan.app/address/${ownerAddress}"
               target="_blank" rel="noopener"
               title="View on ArcScan">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              ${shortAddr(ownerAddress)}
            </a>
          </div>
          ${socialsHtml ? `<div class="hero-socials">${socialsHtml}</div>` : ''}
        </div>
      </div>

      <!-- Metric cards -->
      <div class="metrics-row">
        <div class="metric-card">
          <div class="metric-label">Total Names</div>
          <div class="metric-value">${sorted.length}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">USDC Spent</div>
          <div class="metric-value">${usdcStr}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">First Registered</div>
          <div class="metric-value" style="font-size:${firstRegStr && firstRegStr.length > 7 ? '16px' : '20px'};padding-top:4px">${firstRegStr || '—'}</div>
        </div>
      </div>

      <!-- Names card -->
      <div class="card">
        <div class="card-label">.arc names</div>
        ${nameRowsHtml}
        ${moreHtml}
      </div>

      <!-- Activity card -->
      <div class="card">
        <div class="card-label">Recent activity</div>
        ${activityHtml}
      </div>
    `;
  }

  function expandNames() {
    document.getElementById('hiddenNames').style.display = 'block';
    document.getElementById('moreNamesBtn').style.display = 'none';
  }

  function waitForEthers(attempts) {
    return new Promise((resolve, reject) => {
      (function check(n) {
        if (typeof ethers !== 'undefined') return resolve();
        if (n > 30) return reject(new Error('ethers.js failed to load'));
        setTimeout(() => check(n + 1), 200);
      })(attempts || 0);
    });
  }

  // ── Init ──
  loadProfile().catch(err => {
    console.error('Profile load error:', err);
    showError('Failed to load profile', err.message || 'Check your connection and try again.');
  });
</script>
</body>
</html>
